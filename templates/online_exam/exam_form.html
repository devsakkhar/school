{% extends 'base.html' %}
{% block title %}{{ action }} Exam{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header border-bottom d-flex justify-content-between">
                <h5 class="mb-0">{{ action }} Online Exam</h5>
                <a href="{% url 'online_exam_list' %}" class="btn btn-sm btn-label-success">← Back</a>
            </div>
            <div class="card-body mt-3">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Exam Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ exam.name|default:'' }}"
                                placeholder="e.g. Class 6 Math MCQ Test" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Class <span class="text-danger">*</span></label>
                            <select name="student_class" id="examClassSel" class="form-select" required>
    <option value="">-- Select Class --</option>
    {% for c in classes %}
        <option value="{{ c.id }}" {% if exam.student_class_id == c.id %}selected{% endif %}>
            {{ c.name }}
        </option>
    {% endfor %}
</select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Section</label>
                            <select name="section" id="examSectionSel" class="form-select">
    <option value="">All Sections</option>
    {% for s in sections %}
        <option value="{{ s.id }}" {% if exam.section_id == s.id %}selected{% endif %}>
            {{ s.name }}
        </option>
    {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Subject <span class="text-danger">*</span></label>
                            <input type="text" name="subject" class="form-control" value="{{ exam.subject|default:'' }}"
                                placeholder="e.g. Mathematics" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Duration (minutes)</label>
                            <input type="number" name="duration_minutes" class="form-control"
                                value="{{ exam.duration_minutes|default:30 }}" min="5">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
    {% for val, label in status_choices %}
        <option value="{{ val }}" {% if exam.status == val %}selected{% endif %}>
            {{ label }}
        </option>
    {% endfor %}
</select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Start Time <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="start_time" class="form-control"
                                value="{{ exam.start_time|date:'Y-m-d\TH:i'|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">End Time <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="end_time" class="form-control"
                                value="{{ exam.end_time|date:'Y-m-d\TH:i'|default:'' }}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Total Marks</label>
                            <input type="number" name="total_marks" class="form-control"
                                value="{{ exam.total_marks|default:0 }}" readonly>
                            <small class="text-muted">Auto-calculated from questions</small>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Pass Marks</label>
                            <input type="number" name="pass_marks" class="form-control"
                                value="{{ exam.pass_marks|default:0 }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Instructions</label>
                            <textarea name="instructions" class="form-control" rows="2"
                                placeholder="Optional exam instructions...">{{ exam.instructions|default:'' }}</textarea>
                        </div>
                        <div class="col-12 d-flex justify-content-end gap-2">
                            <a href="{% url 'online_exam_list' %}" class="btn btn-label-danger">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Exam</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
