{% extends 'base.html' %}
{% block title %}{{ action }} Subject{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header border-bottom d-flex justify-content-between align-items-center">
                <h5 class="mb-0">{{ action }} Subject</h5>
                <a href="{% url 'subject_list' %}" class="btn btn-sm btn-label-success">← Subjects</a>
            </div>
            <div class="card-body mt-3">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Subject Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ subject.name|default:'' }}"
                                placeholder="e.g. Mathematics" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Code</label>
                            <input type="text" name="code" class="form-control" value="{{ subject.code|default:'' }}"
                                placeholder="MATH">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Class <span class="text-danger">*</span></label>
                            <select name="student_class" class="form-select" required>
                                <option value="">-- Select Class --</option>
                                {% for c in classes %}
                                <option value="{{ c.id }}" {% if subject.student_class_id == c.id %}selected{% endif %}>
                                    {{ c.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Teacher Name</label>
                            <input type="text" name="teacher_name" class="form-control"
                                value="{{ subject.teacher_name|default:'' }}" placeholder="e.g. Mr. Rahman">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="2"
                                placeholder="Optional notes...">{{ subject.description|default:'' }}</textarea>
                        </div>

                        <div class="col-12 d-flex justify-content-end gap-2 mt-2">
                            <a href="{% url 'subject_list' %}" class="btn btn-label-danger">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="ti tabler-device-floppy me-1"></i>Save Subject
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
