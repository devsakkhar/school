{% extends 'base.html' %}

{% block title %}Classes List | School Management System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card mb-6">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Classes List</h5>
                <div class="d-flex align-items-center gap-3">
                    <a href="{% url 'class_create' %}" class="btn btn-primary text-nowrap">
                        <i class="ti ti tabler-plus me-1"></i> Add New Class
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Class Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody class="table-border-bottom-0">
                        {% for item in classes %}
                        <tr>
                            <td><strong>{{ item.name }}</strong></td>
                            <td>
                                <div class="dropdown">
                                    <button type="button" class="btn p-0 dropdown-toggle hide-arrow"
                                        data-bs-toggle="dropdown">
                                        <i class="ti ti tabler-dots-vertical"></i>
                                    </button>
                                    <div class="dropdown-menu">
                                        <a class="dropdown-item" href="{% url 'class_update' item.pk %}"><i
                                                class="ti ti tabler-pencil me-1"></i> Edit</a>
                                        <a class="dropdown-item" href="{% url 'class_delete' item.pk %}"><i
                                                class="ti ti tabler-trash me-1"></i> Delete</a>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="text-center">No classes found.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
