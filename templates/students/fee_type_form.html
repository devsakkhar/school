{% extends 'base.html' %}
{% block title %}{{ action }} Fee Type{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-7 mx-auto">
        <div class="card">
            <div class="card-header border-bottom d-flex justify-content-between align-items-center">
                <h5 class="mb-0">{{ action }} Fee Type</h5>
                <a href="{% url 'fee_list' %}" class="btn btn-sm btn-label-secondary">← Back</a>
            </div>
            <div class="card-body mt-3">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Fee Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ fee_type.name|default:'' }}"
                                placeholder="e.g. Monthly Tuition Fee" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Amount (৳) <span class="text-danger">*</span></label>
                            <input type="number" name="amount" step="0.01" class="form-control"
                                value="{{ fee_type.amount|default:'' }}" placeholder="500.00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Academic Year</label>
                            <input type="text" name="academic_year" class="form-control"
                                value="{{ fee_type.academic_year|default:'' }}" placeholder="2025-2026">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Due Date</label>
                            <input type="date" name="due_date" class="form-control"
                                value="{{ fee_type.due_date|date:'Y-m-d'|default:'' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Applies To Class</label>
                           <select name="applies_to_class" class="form-select">
    <option value="">All Classes</option>
    {% for c in classes %}
        <option value="{{ c.id }}" {% if fee_type.applies_to_class_id == c.id %}selected{% endif %}>
            {{ c.name }}
        </option>
    {% endfor %}
</select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="2"
                                placeholder="Optional description...">{{ fee_type.description|default:'' }}</textarea>
                        </div>
                        <div class="col-12 d-flex justify-content-end gap-2">
                            <a href="{% url 'fee_list' %}" class="btn btn-label-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
