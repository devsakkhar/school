<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .payment-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }

        .payment-header {
            background: #206bc4;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .payment-body {
            padding: 32px;
        }

        .amount-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #206bc4;
            text-align: center;
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px dashed #e9ecef;
            padding-bottom: 8px;
        }

        .payment-method {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-method:hover {
            border-color: #206bc4;
            background-color: #f8f9fa;
        }

        .payment-method input {
            margin: 0;
        }

        .gateway-logo {
            font-size: 24px;
            color: #495057;
        }
    </style>
</head>

<body>
    <div class="payment-card">
        <div class="payment-header">
            <h3 class="mb-1"><i class="ti tabler-shield-check me-2"></i>Secure Checkout</h3>
            <p class="mb-0 opacity-75">Transaction ID: {{ transaction.transaction_id }}</p>
        </div>

        <div class="payment-body">
            <div class="amount-display">
                ৳{{ transaction.amount|floatformat:2 }}
            </div>

            <div class="detail-row">
                <span class="text-muted">Fee Type:</span>
                <span class="fw-medium">{{ fee_type.name }}</span>
            </div>
            <div class="detail-row">
                <span class="text-muted">Student:</span>
                <span class="fw-medium">{{ student.name }}</span>
            </div>
            <div class="detail-row">
                <span class="text-muted">Due Date:</span>
                <span class="fw-medium">{{ fee_type.due_date|date:"d M Y" }}</span>
            </div>

            <h6 class="mt-4 mb-3 text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Select
                Payment Method</h6>

            <label class="payment-method">
                <input type="radio" name="method" checked>
                <i class="ti tabler-credit-card gateway-logo text-primary"></i>
                <div class="flex-grow-1 text-dark fw-medium">Credit / Debit Card</div>
            </label>

            <label class="payment-method">
                <input type="radio" name="method">
                <i class="ti tabler-device-mobile gateway-logo text-pink"></i>
                <div class="flex-grow-1 text-dark fw-medium">Mobile Banking (bKash/Nagad)</div>
            </label>

            <div class="d-flex gap-2 mt-4 pt-2">
                <a href="{% url 'payment_callback' transaction.transaction_id %}?status=Failed"
                    class="btn btn-light w-50">Cancel</a>
                <a href="{% url 'payment_callback' transaction.transaction_id %}?status=Success"
                    class="btn btn-success w-50"><i class="ti tabler-lock me-1"></i> Pay Now</a>
            </div>

            <div class="text-center mt-4">
                <small class="text-muted"><i class="ti tabler-lock"></i> 100% Secure & Encrypted Payment</small>
            </div>
        </div>
    </div>
</body>

</html>
