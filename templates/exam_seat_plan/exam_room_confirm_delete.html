{% extends 'base.html' %}
{% block title %}Delete Exam Room{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-5">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i> Confirm Deletion</h5>
            </div>
            <div class="card-body">
                <p class="lead">Are you sure you want to delete the exam room <strong>{{ room.name }}</strong>?</p>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post" class="mt-4 d-flex justify-content-end gap-2">
                    {% csrf_token %}
                    <a href="{% url 'exam_room_list' %}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="fas fa-trash me-2"></i> Delete Room
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
