{% extends 'base.html' %}
{% block title %}Delete Notice | School Management System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="card-title mb-0 text-white">Confirm Deletion</h5>
            </div>
            <div class="card-body mt-4">
                <p>Are you sure you want to delete the notice <strong>"{{ notice.title }}"</strong>?</p>
                <div class="alert alert-warning">
                    <i class="ti tabler-alert-triangle me-1"></i> This action cannot be undone.
                </div>

                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'notice_list' %}" class="btn btn-label-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Delete Notice</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
