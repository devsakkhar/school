{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed | School Management System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-xl-6 col-md-8 mx-auto">
        <div class="card mb-6 text-center">
            <div class="card-body py-5">
                <div class="mb-4">
                    <span class="badge bg-label-success p-3 rounded-circle">
                        <i class="ti tabler-shield-check ti-xl"></i>
                    </span>
                </div>
                <h4 class="mb-2">Password Changed Successfully!</h4>
                <p class="text-muted mb-4">
                    Your password has been changed successfully. You can now use your new password to log in.
                </p>
                <div class="d-flex justify-content-center gap-3 mt-5">
                    <a href="{% url 'profile' %}" class="btn btn-primary d-flex align-items-center">
                        <i class="ti tabler-arrow-left me-2"></i> Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
